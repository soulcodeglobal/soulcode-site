<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="icon" type="image/svg+xml" href="/assets/soulcode-icon.svg">
<link rel="apple-touch-icon" href="/assets/soulcode-icon-256.png">
<meta name="color-scheme" content="light only">
<title data-zh="報名成功 · Soul Code Academy" data-en="Thank You · Soul Code Academy">報名成功 · Soul Code Academy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700;900&family=Noto+Sans+TC:wght@400;500;700&family=Noto+Serif+SC:wght@500;700;900&family=Noto+Sans+SC:wght@400;500;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/opencc-js@1.0.5/dist/umd/full.js"></script>
<style>
  :root{--fsans:"Noto Sans TC","Noto Sans SC",system-ui,sans-serif;--fserif:"Noto Serif TC","Noto Serif SC",serif;
    --ink:#0a1a14;--ink-soft:#3f5249;--emerald:#059669;--emerald-deep:#064e3b;--mint:#a7f3d0;--gold:#c9a84c;--gold-soft:#e4cd86;--bg:#fafdfb;--bg-soft:#f1f8f4;--line:#dce8e2;color-scheme:light only}
  html[lang="zh-Hans"]{--fsans:"Noto Sans SC","Noto Sans TC",system-ui,sans-serif;--fserif:"Noto Serif SC","Noto Serif TC",serif}
  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth;background:var(--bg)}
  body{font-family:var(--fsans);color:var(--ink);background:var(--bg);line-height:1.8;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column}
  .wrap{max-width:1080px;margin:0 auto;padding:0 28px;width:100%}
  nav{position:sticky;top:0;z-index:50;background:rgba(250,253,251,.82);backdrop-filter:blur(14px);border-bottom:1px solid var(--line)}
  .nav-in{display:flex;align-items:center;justify-content:space-between;height:72px;gap:16px}
  .brand{display:flex;align-items:center;gap:10px;text-decoration:none}
  .brand img{width:34px;height:34px}
  .brand .b-main{font-family:"Space Grotesk";font-weight:700;font-size:17px;color:var(--ink)}
  .brand .b-sub{font-size:12.5px;color:var(--emerald);font-weight:500;letter-spacing:.04em}
  .lang{display:flex;border:1px solid var(--line);border-radius:999px;overflow:hidden;font-family:"Space Grotesk";font-size:13px;font-weight:500}
  .lang button{border:0;background:transparent;padding:7px 12px;cursor:pointer;color:var(--ink-soft);font-family:inherit}
  .lang button.on{background:var(--emerald);color:#fff}

  main{flex:1;display:flex;align-items:center;justify-content:center;text-align:center;padding:60px 0 80px;position:relative;overflow:hidden}
  .emb{width:96px;height:96px;border-radius:50%;background:var(--bg-soft);border:1.5px solid var(--mint);display:flex;align-items:center;justify-content:center;margin:0 auto 28px;animation:pop .5s cubic-bezier(.2,.9,.3,1.3)}
  @keyframes pop{from{opacity:0;transform:scale(.6)}to{opacity:1;transform:none}}
  .emb svg{width:46px;height:46px;stroke:var(--emerald);fill:none;stroke-width:2.4;stroke-linecap:round;stroke-linejoin:round;stroke-dasharray:40;stroke-dashoffset:40;animation:draw .6s .2s ease forwards}
  @keyframes draw{to{stroke-dashoffset:0}}
  .eyebrow{font-family:"Space Grotesk";font-size:13px;letter-spacing:.18em;text-transform:uppercase;color:var(--emerald);font-weight:500;margin-bottom:16px}
  h1{font-family:var(--fserif);font-weight:900;font-size:clamp(30px,4.6vw,46px);line-height:1.25;margin:0 auto 20px;max-width:18ch}
  .lede{font-size:clamp(15px,2vw,18px);color:var(--ink-soft);max-width:46ch;margin:0 auto 14px}
  .lede b{color:var(--ink)}
  .contact{font-size:14.5px;color:var(--ink-soft);margin:22px auto 0;max-width:46ch}
  .contact a{color:var(--emerald);font-weight:600;text-decoration:none}
  .cta-row{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:34px}
  .btn{display:inline-flex;align-items:center;gap:8px;padding:12px 22px;border-radius:999px;font-size:16px;font-weight:700;text-decoration:none;cursor:pointer;border:0;font-family:inherit;line-height:1.2;transition:transform .15s,box-shadow .2s}
  .btn-primary{background:var(--emerald);color:#fff;box-shadow:0 8px 22px -8px rgba(5,150,105,.55)}
  .btn-primary:hover{transform:translateY(-2px)}
  .btn-ghost{background:transparent;color:var(--emerald-deep);border:1.5px solid var(--line)}
  .btn-ghost:hover{border-color:var(--emerald);color:var(--emerald)}
  .wm{position:absolute;width:300px;height:300px;opacity:.04;bottom:-70px;right:-60px;pointer-events:none}

  footer{padding:40px 0;border-top:1px solid var(--line);text-align:center;color:var(--ink-soft);font-size:13px}
  .footlinks{display:flex;gap:14px;justify-content:center;align-items:center;margin-bottom:18px}
  .iconbtn{width:46px;height:46px;border-radius:50%;border:1.5px solid var(--line);background:#fff;color:var(--emerald-deep);display:inline-flex;align-items:center;justify-content:center;cursor:pointer;transition:transform .15s,border-color .2s,color .2s,background .2s;text-decoration:none}
  .iconbtn:hover{transform:translateY(-2px);border-color:var(--emerald);color:var(--emerald);background:var(--bg-soft)}
  .iconbtn svg{width:21px;height:21px}
  .cprt{font-family:"Space Grotesk";letter-spacing:.02em}
  .wxmodal{position:fixed;inset:0;z-index:200;background:rgba(4,35,26,.55);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;padding:24px}
  .wxmodal.open{display:flex}
  .wxbox{position:relative;background:#fff;border-radius:20px;padding:26px 26px 22px;max-width:320px;width:100%;text-align:center;box-shadow:0 30px 70px -20px rgba(0,0,0,.5)}
  .wxbox img{width:100%;max-width:240px;border-radius:12px}
  .wxbox .wxttl{font-family:var(--fserif);font-weight:700;font-size:17px;margin-bottom:14px}
  .wxbox .wxsub{font-size:13px;color:var(--ink-soft);margin-top:12px}
  .wxbox .wxclose{position:absolute;top:10px;right:12px;width:34px;height:34px;border:0;background:transparent;font-size:24px;color:var(--ink-soft);cursor:pointer}
  .wxbox .wxid{margin-top:8px;font-family:"Space Grotesk";font-size:13px;color:var(--emerald);font-weight:600}
  h1{text-wrap:balance}.lede,.contact{text-wrap:pretty}
</style>
</head>
<body>
<nav>
  <div class="wrap nav-in">
    <a class="brand" href="index.html">
      <img src="/assets/soulcode-icon.svg" alt="Soul Code">
      <span>
        <span class="b-main" style="display:block">Soul Code Academy</span>
        <span class="b-sub" data-zh="靈魂解碼學院" data-en="">靈魂解碼學院</span>
      </span>
    </a>
    <div class="lang">
      <button id="zhtBtn" class="on" onclick="setLang('zht')">繁</button>
      <button id="zhsBtn" onclick="setLang('zhs')">简</button>
      <button id="enBtn" onclick="setLang('en')">EN</button>
    </div>
  </div>
</nav>

<main>
  <img class="wm" src="/assets/soulcode-icon.svg" alt="" aria-hidden="true">
  <div class="wrap">
    <div class="emb"><svg viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5"/></svg></div>
    <div class="eyebrow" data-zh="報名成功 · Confirmed" data-en="Enrolment Confirmed">報名成功 · Confirmed</div>
    <h1 data-zh="多謝你，報名已確認！" data-en="Thank you — you're enrolled!">多謝你，報名已確認！</h1>
    <p class="lede" data-zh="我們已收到你的款項。" data-en="We've received your payment.">我們已收到你的款項。</p>
    <p class="lede" data-zh="課程詳情與 Zoom 連結（如適用）會在開課前，透過你報名時提供的聯絡方式發送給你。" data-en="Course details and the Zoom link (if applicable) will be sent before the start date, via the contact you provided at enrolment.">課程詳情與 Zoom 連結（如適用）會在開課前，透過你報名時提供的聯絡方式發送給你。</p>
    <p class="contact"><span data-zh="有任何問題，歡迎隨時聯絡我們：" data-en="Any questions? Reach us anytime:">有任何問題，歡迎隨時聯絡我們：</span><br><a href="https://wa.me/61429419367" target="_blank" rel="noopener">WhatsApp +61 429 419 367</a> · <a href="https://www.instagram.com/soulcodeglobal?igsh=M3o4NWoyejlwaGk=" target="_blank" rel="noopener">IG @soulcodeglobal</a></p>
    <div class="cta-row">
      <a href="index.html" class="btn btn-primary"><span data-zh="返回首頁" data-en="Back to home">返回首頁</span> <span>→</span></a>
      <a href="courses.html" class="btn btn-ghost"><span data-zh="查看更多課程" data-en="Browse courses">查看更多課程</span></a>
    </div>
  </div>
</main>

<footer>
  <div class="wrap">
    <div class="footlinks">
      <a class="iconbtn" href="mailto:hello@soulcodeglobal.com" aria-label="Email"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m2 7 10 6 10-6"/></svg></a>
      <a class="iconbtn" href="https://www.instagram.com/soulcodeglobal?igsh=M3o4NWoyejlwaGk=" target="_blank" rel="noopener" aria-label="Instagram"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1.1" fill="currentColor" stroke="none"/></svg></a>
      <a class="iconbtn" href="https://wa.me/61429419367" target="_blank" rel="noopener" aria-label="WhatsApp"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12.04 2C6.58 2 2.13 6.45 2.13 11.91c0 1.75.46 3.45 1.32 4.95L2 22l5.25-1.38a9.9 9.9 0 0 0 4.79 1.22h.01c5.46 0 9.91-4.45 9.91-9.91 0-2.65-1.03-5.14-2.9-7.01A9.82 9.82 0 0 0 12.04 2zm0 1.8c2.16 0 4.19.84 5.72 2.37a8.06 8.06 0 0 1 2.37 5.74c0 4.46-3.63 8.09-8.1 8.09a8.2 8.2 0 0 1-4.13-1.13l-.3-.18-3.12.82.83-3.04-.19-.31a8.04 8.04 0 0 1-1.26-4.35c0-4.46 3.63-8.09 8.1-8.09zm4.7 10.49c-.06-.11-.24-.18-.5-.31-.26-.13-1.53-.76-1.77-.84-.24-.09-.41-.13-.59.13-.17.26-.67.84-.82 1.01-.15.18-.3.2-.56.07-.26-.13-1.09-.4-2.08-1.28-.77-.69-1.29-1.53-1.44-1.79-.15-.26-.02-.4.11-.53.12-.12.26-.3.39-.46.13-.15.17-.26.26-.43.09-.18.04-.33-.02-.46-.07-.13-.59-1.42-.81-1.94-.21-.51-.43-.44-.59-.45l-.5-.01c-.18 0-.46.07-.7.33-.24.26-.92.9-.92 2.19 0 1.29.94 2.54 1.07 2.71.13.18 1.85 2.82 4.48 3.96.63.27 1.11.43 1.49.55.63.2 1.2.17 1.65.1.5-.07 1.53-.62 1.75-1.23.21-.61.21-1.13.15-1.24z"/></svg></a>
      <button class="iconbtn" id="wxBtn" aria-label="WeChat"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M8.69 4C4.62 4 1.3 6.74 1.3 10.13c0 1.96 1.12 3.71 2.86 4.84l-.62 1.92 2.2-1.13c.79.16 1.43.32 2.22.32.2 0 .4-.01.6-.03a4.5 4.5 0 0 1-.18-1.25c0-2.95 2.81-5.3 6.22-5.3.2 0 .4.01.6.03C14.7 6.03 12 4 8.69 4zM6.3 8.6a.92.92 0 1 1 0-1.84.92.92 0 0 1 0 1.84zm4.78 0a.92.92 0 1 1 0-1.84.92.92 0 0 1 0 1.84zm11.62 5.7c0-2.83-2.81-5.13-5.96-5.13-3.32 0-5.95 2.3-5.95 5.13s2.63 5.13 5.95 5.13c.66 0 1.33-.16 1.99-.32l1.82.99-.5-1.65c1.33-.99 2.65-2.3 2.65-4.15zm-7.78-.82a.76.76 0 1 1 0-1.52.76.76 0 0 1 0 1.52zm3.64 0a.76.76 0 1 1 0-1.52.76.76 0 0 1 0 1.52z"/></svg></button>
    </div>
    <span class="cprt" data-zh="Soul Code Academy 靈魂解碼學院 Pty Ltd · © 2026 All Rights Reserved" data-en="Soul Code Academy Pty Ltd · © 2026 All Rights Reserved">Soul Code Academy 靈魂解碼學院 Pty Ltd · © 2026 All Rights Reserved</span>
  </div>
</footer>

<div class="wxmodal" id="wxModal">
  <div class="wxbox">
    <button class="wxclose" id="wxClose" aria-label="Close">×</button>
    <div class="wxttl" data-zh="加我們的 WeChat" data-en="Add us on WeChat">加我們的 WeChat</div>
    <img src="/assets/wechat-qr.png" alt="WeChat QR Code">
    <div class="wxid">ID：soulcodeglobal</div>
    <div class="wxsub" data-zh="掃描 QR Code，新增我們為朋友。" data-en="Scan the QR code to add us.">掃描 QR Code，新增我們為朋友。</div>
  </div>
</div>

<script>
  const zhtBtn=document.getElementById('zhtBtn'),zhsBtn=document.getElementById('zhsBtn'),enBtn=document.getElementById('enBtn');
  let _conv=null;
  function conv(s){ if(!_conv && window.OpenCC){ try{_conv=OpenCC.Converter({from:'hk',to:'cn'});}catch(e){} } return _conv? _conv(s): s; }
  function applyText(el,l){
    let t=(l==='en')?el.getAttribute('data-en'):el.getAttribute('data-zh');
    if(t===null)return; if(l==='zhs')t=conv(t); el.innerHTML=t;
  }
  function setLang(l){
    try{localStorage.setItem('sc_lang',l);}catch(e){}
    document.documentElement.lang=l==='en'?'en':(l==='zhs'?'zh-Hans':'zh-Hant');
    zhtBtn.classList.toggle('on',l==='zht');zhsBtn.classList.toggle('on',l==='zhs');enBtn.classList.toggle('on',l==='en');
    document.querySelectorAll('[data-zh]').forEach(el=>applyText(el,l));
  }
  setLang((function(){try{return localStorage.getItem('sc_lang')||'zht';}catch(e){return 'zht';}})());
  (function(){var b=document.getElementById('wxBtn'),m=document.getElementById('wxModal'),c=document.getElementById('wxClose');
   if(!b||!m)return; function op(){m.classList.add('open');}function cl(){m.classList.remove('open');}
   b.addEventListener('click',op);c.addEventListener('click',cl);
   m.addEventListener('click',function(e){if(e.target===m)cl();});
   document.addEventListener('keydown',function(e){if(e.key==='Escape')cl();});})();
</script>
</body>
</html>
