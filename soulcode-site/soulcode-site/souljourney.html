<style>
  :root{--fsans:"Noto Sans TC","Noto Sans SC",system-ui,sans-serif;--fserif:"Noto Serif TC","Noto Serif SC",serif;
    --ink:#0a1a14;--ink-soft:#3f5249;--emerald:#059669;--emerald-deep:#064e3b;
    --mint:#a7f3d0;--gold:#c9a84c;--gold-soft:#e4cd86;--bg:#fafdfb;--bg-soft:#f1f8f4;--bg-deep:#04231a;--line:#dce8e2;--r:18px;
  }
  :root{color-scheme:light only}
  html[lang="zh-Hans"]{--fsans:"Noto Sans SC","Noto Sans TC",system-ui,sans-serif;--fserif:"Noto Serif SC","Noto Serif TC",serif}
  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth;background:var(--bg);-webkit-text-size-adjust:100%}
  body{font-family:var(--fsans);color:var(--ink);background:var(--bg);line-height:1.75;-webkit-font-smoothing:antialiased;overflow-x:hidden;min-height:100vh;display:flex;flex-direction:column}
  .wrap{max-width:560px;margin:0 auto;padding:0 24px;width:100%}
  .clz{display:inline-block;white-space:nowrap}

  /* top bar — brand + lang only (no nav) */
  .topbar{padding:22px 0 6px}
  .topbar .wrap{display:flex;align-items:center;justify-content:space-between;gap:16px}
  .brand{display:flex;align-items:center;gap:10px;text-decoration:none}
  .brand img{width:32px;height:32px;display:block}
  .brand .bt{display:flex;flex-direction:column;line-height:1.15}
  .brand .b-main{font-family:"Space Grotesk";font-weight:700;font-size:16px;letter-spacing:.01em;color:var(--ink)}
  .brand .b-sub{font-size:12px;color:var(--emerald);font-weight:500;letter-spacing:.04em}
  .lang{display:flex;border:1px solid var(--line);border-radius:999px;overflow:hidden;font-family:"Space Grotesk";font-size:12.5px;font-weight:500;flex-shrink:0}
  .lang button{border:0;background:transparent;padding:6px 11px;cursor:pointer;color:var(--ink-soft);transition:all .2s;font-family:inherit}
  .lang button.on{background:var(--emerald);color:#fff}

  /* hero */
  .hero{text-align:center;padding:26px 0 10px}
  .emblem{position:relative;width:104px;height:104px;margin:0 auto 20px}
  .emblem-svg{width:100%;height:100%;display:block}
  .hero-dial{transform-box:fill-box;transform-origin:center;animation:spin 48s linear infinite}
  .hero-pulse{transform-box:fill-box;transform-origin:center;animation:heropulse 3.4s ease-in-out infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes heropulse{0%,100%{opacity:.45;transform:scale(1)}50%{opacity:.12;transform:scale(1.22)}}
  .eyebrow{font-family:"Space Grotesk";font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--emerald);font-weight:500;margin-bottom:14px}
  h1{font-family:var(--fserif);font-weight:900;font-size:clamp(22px,6vw,28px);line-height:1.4;letter-spacing:.01em;margin:0 auto;max-width:20ch;color:var(--ink)}

  /* links */
  .links{padding:26px 0 8px;display:flex;flex-direction:column;gap:14px}

  /* primary card — calculator */
  .lk-main{position:relative;display:block;text-decoration:none;background:var(--emerald);color:#fff;border-radius:var(--r);padding:24px 24px;box-shadow:0 16px 34px -14px rgba(5,150,105,.55);transition:transform .18s,box-shadow .2s;overflow:hidden}
  .lk-main:hover{transform:translateY(-3px);box-shadow:0 22px 40px -14px rgba(5,150,105,.6)}
  .lk-main .badge{display:inline-block;font-family:"Space Grotesk";font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;background:rgba(255,255,255,.2);color:#fff;border-radius:999px;padding:3px 11px;margin-bottom:12px}
  .lk-main .lk-t{font-family:var(--fserif);font-weight:700;font-size:clamp(19px,4.6vw,22px);line-height:1.35;margin-bottom:6px;display:flex;align-items:center;gap:8px;justify-content:space-between}
  .lk-main .lk-t .arr{font-family:"Space Grotesk";flex-shrink:0;transition:transform .2s}
  .lk-main:hover .lk-t .arr{transform:translateX(4px)}
  .lk-main .lk-s{font-size:14px;color:#d6f3e7;line-height:1.6}

  /* secondary cards — consult + course */
  .lk{position:relative;display:block;text-decoration:none;background:#fff;border:1px solid var(--line);border-left:3px solid var(--lc,var(--gold));color:var(--ink);border-radius:14px;padding:18px 20px;transition:transform .18s,border-color .2s,box-shadow .2s}
  .lk:hover{transform:translateY(-2px);box-shadow:0 14px 30px -18px color-mix(in srgb,var(--lc,var(--gold)) 55%,transparent)}
  .lk .lk-t{font-family:var(--fserif);font-weight:700;font-size:17px;line-height:1.35;margin-bottom:3px;display:flex;align-items:center;gap:8px;justify-content:space-between;color:var(--ink)}
  .lk .lk-t .arr{font-family:"Space Grotesk";color:var(--lc,var(--gold));flex-shrink:0;transition:transform .2s}
  .lk:hover .lk-t .arr{transform:translateX(4px)}
  .lk .lk-s{font-size:13.5px;color:var(--ink-soft);line-height:1.6}

  /* footer */
  footer{margin-top:auto;padding:34px 0 34px;text-align:center;color:var(--ink-soft);font-size:13px}
  .footlinks{display:flex;gap:12px;justify-content:center;align-items:center;margin-bottom:16px}
  .iconbtn{width:44px;height:44px;border-radius:50%;border:1.5px solid var(--line);background:#fff;color:var(--emerald-deep);display:inline-flex;align-items:center;justify-content:center;cursor:pointer;transition:transform .15s,border-color .2s,color .2s,background .2s;text-decoration:none;padding:0}
  .iconbtn:hover{transform:translateY(-2px);border-color:var(--emerald);color:var(--emerald);background:var(--bg-soft)}
  .iconbtn svg{width:20px;height:20px}
  footer .cprt{font-family:"Space Grotesk";letter-spacing:.02em;font-size:12px}

  /* wechat modal */
  .wxmodal{position:fixed;inset:0;z-index:200;background:rgba(4,35,26,.55);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;padding:24px}
  .wxmodal.open{display:flex}
  .wxbox{position:relative;background:#fff;border-radius:20px;padding:26px 26px 22px;max-width:320px;width:100%;text-align:center;box-shadow:0 30px 70px -20px rgba(0,0,0,.5);animation:pop .22s ease}
  @keyframes pop{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:none}}
  .wxbox img{width:100%;max-width:240px;border-radius:12px}
  .wxbox .wxttl{font-family:var(--fserif);font-weight:700;font-size:17px;margin-bottom:14px;color:var(--ink)}
  .wxbox .wxsub{font-size:13px;color:var(--ink-soft);margin-top:12px}
  .wxbox .wxclose{position:absolute;top:10px;right:12px;width:34px;height:34px;border:0;background:transparent;font-size:24px;line-height:1;color:var(--ink-soft);cursor:pointer}
  .wxbox .wxid{margin-top:8px;font-family:"Space Grotesk";font-size:13px;color:var(--emerald);font-weight:600}

  .reveal{opacity:0;transform:translateY(16px);transition:opacity .6s ease,transform .6s ease}
  .reveal.in{opacity:1;transform:none}
  @media(prefers-reduced-motion:reduce){.reveal{opacity:1;transform:none;transition:none}.hero-dial{animation:none}.hero-pulse{animation:none}*{scroll-behavior:auto}}
  h1{text-wrap:balance}p,.lk-s{text-wrap:pretty}
</style>

<script>
  const zhtBtn=document.getElementById('zhtBtn'),zhsBtn=document.getElementById('zhsBtn'),enBtn=document.getElementById('enBtn');
  let _conv=null;
  function conv(s){ if(!_conv && window.OpenCC){ try{_conv=OpenCC.Converter({from:'hk',to:'cn'});}catch(e){} } return _conv? _conv(s): s; }
  function applyText(el,l){
    let t = (l==='en')? el.getAttribute('data-en') : el.getAttribute('data-zh');
    if(t===null) return;
    if(l==='zhs') t=conv(t);
    el.textContent=t;
  }
  function setLang(l){
    try{localStorage.setItem('sc_lang',l);}catch(e){}
    document.documentElement.lang = l==='en'?'en':(l==='zhs'?'zh-Hans':'zh-Hant');
    zhtBtn.classList.toggle('on',l==='zht');
    zhsBtn.classList.toggle('on',l==='zhs');
    enBtn.classList.toggle('on',l==='en');
    document.querySelectorAll('[data-zh]').forEach(el=>applyText(el,l));
  }
  setLang((function(){try{return localStorage.getItem('sc_lang')||'zht';}catch(e){return 'zht';}})());

  const io=new IntersectionObserver((es)=>{es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target);}});},{threshold:.12});
  document.querySelectorAll('.reveal').forEach(el=>io.observe(el));

  /* WeChat modal */
  (function(){var b=document.getElementById('wxBtn'),m=document.getElementById('wxModal'),c=document.getElementById('wxClose');
   if(!b||!m)return;
   function open(){m.classList.add('open');} function close(){m.classList.remove('open');}
   b.addEventListener('click',open); c.addEventListener('click',close);
